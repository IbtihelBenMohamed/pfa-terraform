name: Deploy Infrastructure PFA

on:
  push:
    branches: [main]

jobs:
  terraform:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        env:
          TF_VAR_os_password: ${{ secrets.OS_PASSWORD }}

      - name: Terraform Plan
        run: terraform plan
        env:
          TF_VAR_os_password: ${{ secrets.OS_PASSWORD }}

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_os_password: ${{ secrets.OS_PASSWORD }}

